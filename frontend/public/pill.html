<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Siplinx</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    -webkit-user-select: none; user-select: none; }

  #pill { display: none; }
  #pill.show { display: flex; }

  .card {
    display: flex; align-items: center; width: 100%; height: 100%;
    background: #ffffff; border: 1px solid #e7e5e0; border-radius: 14px;
    box-shadow: 0 12px 34px -8px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.12);
    overflow: hidden;
  }
  .grip { width: 20px; align-self: stretch; cursor: grab; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #cbc9c3; border-right: 1px solid #f0efec; }
  .grip:active { cursor: grabbing; }

  /* --- состояние: детект --- */
  .detect { display: none; align-items: center; gap: 11px; padding: 10px 12px 10px 11px; flex: 1; min-width: 0; }
  #pill[data-state="detect"] .detect { display: flex; }
  .ico { width: 36px; height: 36px; border-radius: 50%; background: #f0edff; color: #6d5cff;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .txt { min-width: 0; flex: 1; }
  .txt .t { font-size: 13px; font-weight: 700; color: #232220; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txt .s { font-size: 12px; color: #8a8781; margin-top: 1px; }
  .btn-rec { font: inherit; font-size: 12.5px; font-weight: 600; background: #e0402d; color: #fff;
    border: none; padding: 8px 13px; border-radius: 9px; cursor: pointer; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .btn-rec:disabled { opacity: .68; cursor: default; }
  .btn-rec .rd { width: 7px; height: 7px; border-radius: 50%; background: #fff; }
  .btn-x { width: 28px; height: 28px; border-radius: 8px; border: none; background: transparent;
    color: #b3b0aa; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-x:hover { background: #f4f3f0; color: #6b6864; }

  /* --- состояние: запись --- */
  .rec { display: none; align-items: center; gap: 11px; padding: 10px 14px 10px 11px; flex: 1; min-width: 0; }
  #pill[data-state="rec"] .rec { display: flex; }
  .dot { position: relative; width: 11px; height: 11px; flex-shrink: 0; }
  .dot .core { position: absolute; inset: 0; border-radius: 50%; background: #e0402d; }
  .dot .ping { position: absolute; inset: 0; border-radius: 50%; background: #e0402d; opacity: .55;
    animation: ping 1.5s ease-out infinite; }
  @keyframes ping { 0% { transform: scale(1); opacity: .55; } 100% { transform: scale(2.4); opacity: 0; } }
  .time { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 14.5px; color: #232220; min-width: 46px; }
  .wave { display: flex; align-items: center; gap: 3px; height: 18px; flex: 1; }
  .wave i { width: 3px; border-radius: 2px; background: #e0402d; opacity: .8; animation: eq 1s ease-in-out infinite; }
  .wave i:nth-child(1){height:7px;animation-delay:0s}
  .wave i:nth-child(2){height:15px;animation-delay:.12s}
  .wave i:nth-child(3){height:10px;animation-delay:.24s}
  .wave i:nth-child(4){height:17px;animation-delay:.36s}
  .wave i:nth-child(5){height:6px;animation-delay:.48s}
  @keyframes eq { 0%,100%{ transform: scaleY(.5);} 50%{ transform: scaleY(1);} }
  .btn-stop { font: inherit; font-size: 12.5px; font-weight: 600; background: #f4f3f0; color: #4a4842;
    border: 1px solid #e7e5e0; padding: 7px 12px; border-radius: 9px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .btn-stop .sq { width: 8px; height: 8px; border-radius: 2px; background: #e0402d; }
</style>
</head>
<body>
  <div id="pill" data-state="detect">
    <div class="card">
      <div class="grip" id="grip" title="">
        <svg width="6" height="18" viewBox="0 0 6 18"><g fill="currentColor"><circle cx="1.5" cy="2" r="1.3"/><circle cx="1.5" cy="9" r="1.3"/><circle cx="1.5" cy="16" r="1.3"/><circle cx="4.5" cy="2" r="1.3"/><circle cx="4.5" cy="9" r="1.3"/><circle cx="4.5" cy="16" r="1.3"/></g></svg>
      </div>

      <div class="detect">
        <div class="ico">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>
        </div>
        <div class="txt">
          <div class="t" id="detect-title">Обнаружена встреча</div>
          <div class="s" id="detect-sub">Записать встречу?</div>
        </div>
        <button class="btn-rec" id="btn-record"><span class="rd"></span> <span id="btn-record-label">Записать</span></button>
        <button class="btn-x" id="btn-dismiss" title="Не сейчас">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="rec">
        <div class="dot"><span class="ping"></span><span class="core"></span></div>
        <div class="time" id="rec-time">00:00</div>
        <div class="wave"><i></i><i></i><i></i><i></i><i></i></div>
        <button class="btn-stop" id="btn-stop"><span class="sq"></span> <span id="btn-stop-label">Стоп</span></button>
      </div>
    </div>
  </div>
  <script src="/pill.js"></script>
</body>
</html>
